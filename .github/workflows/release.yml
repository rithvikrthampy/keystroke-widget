name: Release

# Builds the Windows installers and publishes them to a GitHub Release
# whenever you push a version tag like v0.1.0.
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# The .msi and .exe (NSIS) installers are attached to the release automatically.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write # required so the action can create the release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Keystroke Tracker ${{ github.ref_name }}"
          releaseBody: |
            Download and install:

            - **`.exe`** — recommended Windows installer (NSIS).
            - **`.msi`** — alternative Windows Installer package.

            After installing, open the app, go to settings (⚙) and enable
            "Autostart on boot" if you want it to launch at startup.
          releaseDraft: false
          prerelease: false
